project:
  type: website
  preview:
    port: 12345
  render:
    - "./*.qmd"
    - "slides/*.qmd"
    - "lab/*.qmd"
    - "about/index.qmd"
  resources:
    - slides

website:
  title: "Introduction to AI and LLMs"
  description: "This is a workshop for high school students to learn about AI and LLMs."
  site-url: https://github.com/kvarada/GIRLsmarts-workshop

  repo-url: https://github.com/kvarada/GIRLsmarts-workshop
  repo-subdir: website

  navbar:
    title: "Introduction to AI and LLMs"
    left:
      - href: index.qmd
        text: Home
      - href: workshop.qmd
        text: Workshop
      - href: about/index.qmd
        text: Instructor

  page-navigation: true

  sidebar:
    - id: workshop
      contents:
        - workshop.qmd
        - workshop-01.qmd
        - workshop-02.qmd
        - workshop-03.qmd
        - workshop-04-break.qmd
        - workshop-06.qmd
format:
  html:
    theme: [zephyr]
    toc: false
    lightbox: true

editor:
  render-on-save: true

execute:
  freeze: auto

publish:
  gh-pages:
    name: "gh-pages"
    branch: main # Or "master" or whatever branch you use
    path: website
